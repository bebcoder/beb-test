<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>پروژه تست BEB</title>

<style>
body{
    margin:0;
    font-family:tahoma;
    background:#f5f7fa;
}

.hero{
    background:#022143;
    color:white;
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    margin:0;
    font-size:38px;
}

.hero p{
    opacity:.9;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

.card{
    background:white;
    border-radius:16px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card a{
    display:inline-block;
    margin-top:15px;
    background:#022143;
    color:white;
    text-decoration:none;
    padding:10px 20px;
    border-radius:8px;
}

footer{
    text-align:center;
    padding:30px;
    color:#666;
}
</style>

</head>
<body>

<section class="hero">
    <h1>BEB Project Hub</h1>
    <p>محیط آزمایشی انتشار روی Cloudflare Pages</p>
</section>

<div class="container">

    <div class="card">
        <h2>صفحه دوم</h2>
        <p>
            این کارت فقط برای تست لینک داخلی سایت ساخته شده است.
        </p>

        <a href="page2.html">
            ورود به صفحه دوم
        </a>
    </div>

</div>

<footer>
    Test Version 1.0
</footer>

</body>
</html>
