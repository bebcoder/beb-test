<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحه دوم</title>

<style>

body{
    margin:0;
    background:#f5f7fa;
    font-family:tahoma;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:40px;
    border-radius:16px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    text-align:center;
}

a{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    background:#022143;
    color:white;
    padding:10px 20px;
    border-radius:8px;
}

</style>

</head>
<body>

<div class="box">

    <h1>صفحه دوم</h1>

    <p>
        اگر این صفحه را می‌بینی یعنی لینک داخلی سایت درست کار می‌کند.
    </p>

    <a href="index.html">
        بازگشت به صفحه اصلی
    </a>

</div>

</body>
</html>
